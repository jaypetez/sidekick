<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" role="img" aria-label="Sidekick — a friendly AI assistant logo">
  <title>Sidekick</title>
  <desc>A friendly AI assistant character with a glowing antenna, screen face, and floating particles, with the wordmark SIDEKICK underneath.</desc>

  <defs>
    <!-- Body gradient -->
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>

    <!-- Screen gradient -->
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0B1029"/>
    </linearGradient>

    <!-- Soft halo behind the character -->
    <radialGradient id="halo">
      <stop offset="0%"  stop-color="#A78BFA" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#A78BFA" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>

    <!-- Antenna tip glow -->
    <radialGradient id="tipGlow">
      <stop offset="0%"  stop-color="#FBBF24" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#F472B6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#F472B6" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft drop-shadow for the body, GitHub-safe (filter primitives are allowed) -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Pulsing halo (lives behind everything, doesn't bob with the character) -->
  <circle cx="300" cy="190" r="150" fill="url(#halo)">
    <animate attributeName="r"       values="140;165;140" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- ===== Character group — gentle floating bob ===== -->
  <g filter="url(#softShadow)">
    <animateTransform attributeName="transform" attributeType="XML"
                      type="translate" values="0 0; 0 -10; 0 0"
                      dur="4s" repeatCount="indefinite"
                      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0;0.5;1"/>

    <!-- Antenna stem -->
    <line x1="300" y1="118" x2="300" y2="78" stroke="#8B5CF6" stroke-width="5" stroke-linecap="round"/>

    <!-- Antenna tip glow halo -->
    <circle cx="300" cy="70" r="18" fill="url(#tipGlow)">
      <animate attributeName="r" values="16;26;16" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <!-- Antenna tip core -->
    <circle cx="300" cy="70" r="6" fill="#FBBF24">
      <animate attributeName="r"    values="5;7.5;5"                 dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#FBBF24;#F472B6;#FBBF24" dur="3.2s" repeatCount="indefinite"/>
    </circle>

    <!-- Body — rounded "AI buddy" silhouette -->
    <rect x="206" y="125" width="188" height="148" rx="78" ry="58" fill="url(#body)"/>

    <!-- Subtle body highlight -->
    <ellipse cx="260" cy="148" rx="40" ry="10" fill="#FFFFFF" opacity="0.18"/>

    <!-- Screen face -->
    <rect x="232" y="156" width="136" height="92" rx="22" ry="22" fill="url(#screen)"/>
    <!-- Screen scanline shimmer -->
    <rect x="232" y="156" width="136" height="92" rx="22" ry="22" fill="#22D3EE" opacity="0">
      <animate attributeName="opacity" values="0;0.06;0" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- Eyes — cyan LCD glow with periodic blink -->
    <g>
      <ellipse cx="275" cy="200" rx="10" ry="14" fill="#22D3EE">
        <animate attributeName="ry"
                 values="14;14;14;14;14;1;14;14;14;14;14;14;14;14;14;14;14;14;1;14"
                 keyTimes="0;0.05;0.1;0.2;0.4;0.42;0.44;0.5;0.6;0.65;0.7;0.75;0.8;0.82;0.85;0.88;0.9;0.92;0.95;1"
                 dur="6s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="325" cy="200" rx="10" ry="14" fill="#22D3EE">
        <animate attributeName="ry"
                 values="14;14;14;14;14;1;14;14;14;14;14;14;14;14;14;14;14;14;1;14"
                 keyTimes="0;0.05;0.1;0.2;0.4;0.42;0.44;0.5;0.6;0.65;0.7;0.75;0.8;0.82;0.85;0.88;0.9;0.92;0.95;1"
                 dur="6s" repeatCount="indefinite"/>
      </ellipse>
      <!-- Eye highlights (catchlight) -->
      <circle cx="278" cy="196" r="2.5" fill="#FFFFFF" opacity="0.9"/>
      <circle cx="328" cy="196" r="2.5" fill="#FFFFFF" opacity="0.9"/>
    </g>

    <!-- Smile — gentle, content -->
    <path d="M283 225 Q300 238 317 225"
          stroke="#22D3EE" stroke-width="3" stroke-linecap="round" fill="none"/>

    <!-- Floating "hands" — small orbs the character holds at its sides -->
    <circle cx="178" cy="205" r="14" fill="url(#body)">
      <animate attributeName="cy" values="205;195;205" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="422" cy="205" r="14" fill="url(#body)">
      <animate attributeName="cy" values="205;215;205" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ===== Ambient sparkle particles around the character ===== -->
  <g>
    <!-- Top-left -->
    <circle cx="140" cy="120" r="3" fill="#A78BFA">
      <animate attributeName="cy"      values="120;90;120"   dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0"        dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Top-right -->
    <circle cx="465" cy="135" r="3" fill="#22D3EE">
      <animate attributeName="cy"      values="135;100;135"  dur="3.8s" repeatCount="indefinite" begin="0.4s"/>
      <animate attributeName="opacity" values="0;1;0"        dur="3.8s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
    <!-- Mid-left -->
    <circle cx="115" cy="200" r="2.5" fill="#F472B6">
      <animate attributeName="cy"      values="200;180;200"  dur="5s"   repeatCount="indefinite" begin="1.2s"/>
      <animate attributeName="opacity" values="0;1;0"        dur="5s"   repeatCount="indefinite" begin="1.2s"/>
    </circle>
    <!-- Mid-right -->
    <circle cx="495" cy="215" r="2.5" fill="#FBBF24">
      <animate attributeName="cy"      values="215;195;215"  dur="4.2s" repeatCount="indefinite" begin="0.8s"/>
      <animate attributeName="opacity" values="0;1;0"        dur="4.2s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <!-- Lower-left -->
    <circle cx="170" cy="275" r="2" fill="#A78BFA">
      <animate attributeName="cy"      values="275;255;275"  dur="3.6s" repeatCount="indefinite" begin="1.8s"/>
      <animate attributeName="opacity" values="0;1;0"        dur="3.6s" repeatCount="indefinite" begin="1.8s"/>
    </circle>
    <!-- Lower-right -->
    <circle cx="448" cy="280" r="2" fill="#22D3EE">
      <animate attributeName="cy"      values="280;258;280"  dur="4.8s" repeatCount="indefinite" begin="2.1s"/>
      <animate attributeName="opacity" values="0;1;0"        dur="4.8s" repeatCount="indefinite" begin="2.1s"/>
    </circle>
  </g>

  <!-- ===== Wordmark ===== -->
  <text x="300" y="335" text-anchor="middle"
        font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="800" letter-spacing="10" fill="#1E1B4B">SIDEKICK</text>
</svg>
