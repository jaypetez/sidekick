  <path d="M400 225 Q430 250 455 268" stroke="#E74C3C" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M405 240 Q432 260 460 275" stroke="#E74C3C" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Tail -->
