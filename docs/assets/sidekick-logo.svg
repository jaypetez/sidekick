  <!-- Text -->
  <text x="300" y="310" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="6" fill="#7F8C8D">F A M L O B S T E R</text>
